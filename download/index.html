<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b10" />
  <meta name="apple-itunes-app" content="app-id=6761989769" />
  <meta name="description" content="Download Readgate free on the App Store. Read one useful idea before you scroll." />
  <link rel="canonical" href="https://readgateapp.com/download" />
  <link rel="icon" href="/icon-128.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <title>Download Readgate — Read before you scroll</title>
  <style>
    @font-face {
      font-family: "Inter";
      src: url("/fonts/Inter-Regular.woff2") format("woff2");
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: "Inter";
      src: url("/fonts/Inter-ExtraBold.woff2") format("woff2");
      font-weight: 800;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 28px;
      color: #f7f7fa;
      background:
        radial-gradient(circle at 50% 28%, rgba(99, 102, 241, 0.28), transparent 24rem),
        #080b10;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: min(100%, 680px);
      padding: clamp(30px, 7vw, 62px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 30px;
      background: rgba(17, 23, 32, 0.92);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      border-radius: 20px;
    }
    .eyebrow {
      margin: 0 0 15px;
      color: #bfc0ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(38px, 8vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 800;
    }
    p {
      max-width: 510px;
      margin: 0 auto 30px;
      color: #b5b7c0;
      font-size: 17px;
      line-height: 1.65;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .qr {
      width: 88px;
      height: 88px;
      padding: 7px;
      border-radius: 13px;
      background: #fff;
    }
    .button {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(135deg, #5558e8, #7048da);
      box-shadow: 0 14px 38px rgba(85, 88, 232, 0.3);
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
    }
    .back {
      display: inline-block;
      margin-top: 30px;
      color: #9fa2ad;
      font-size: 13px;
      text-decoration: none;
    }
    .back:hover { color: #fff; }
    :focus-visible { outline: 3px solid #b8b9ff; outline-offset: 4px; }
    @media (max-width: 520px) {
      .qr { display: none; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/icon-128.png" alt="" width="72" height="72" />
    <p class="eyebrow">Readgate for iPhone</p>
    <h1>Read before you scroll.</h1>
    <p>Open a time sink. Read one useful idea. Then unlock it. Readgate is free to start, with optional Pro controls.</p>
    <div class="actions">
      <img class="qr" src="/qr-app-store.png" alt="QR code to download Readgate on the App Store" width="88" height="88" />
      <a class="button" href="https://apps.apple.com/app/id6761989769">Get Readgate — free</a>
    </div>
    <a class="back" href="/">← Back to readgateapp.com</a>
  </main>
</body>
</html>
