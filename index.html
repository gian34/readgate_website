<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Readgate — Read to Unlock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .logo { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .tagline { font-size: 18px; color: #666; margin-bottom: 48px; }
    .badge {
      display: inline-block;
      background: #1c1c1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      color: #aaa;
      margin-bottom: 64px;
    }
    .links { display: flex; gap: 24px; font-size: 13px; }
    .links a { color: #555; text-decoration: none; }
    .links a:hover { color: #aaa; }
  </style>
</head>
<body>
  <div class="logo">Readgate</div>
  <p class="tagline">Read to unlock your apps.</p>
  <div class="badge">Coming soon to the App Store</div>
  <div class="links">
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <a href="mailto:hello@readgateapp.com">Contact</a>
  </div>
</body>
</html>
